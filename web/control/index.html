<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <title>crt-tv control</title>
  <link rel="stylesheet" href="control.css" />
</head>
<body>
  <main>
    <header>
      <h1>CRT&nbsp;TV<span class="sub">control</span></h1>
      <span id="status" class="status off">connecting…</span>
    </header>

    <!-- live output: exactly what the CRT is showing right now -->
    <div class="screen-frame">
      <iframe id="screen" src="/display" title="live CRT output" scrolling="no"></iframe>
    </div>

    <div class="heading">Channel</div>
    <div class="modes">
      <button class="mode" data-mode="weather">Weather</button>
      <button class="mode" data-mode="teletext">Teletext</button>
      <button class="mode" data-mode="video">Video</button>
    </div>
    <p class="now">Now showing: <strong id="now-mode">—</strong></p>

    <div class="heading">Selected displays</div>
    <div id="wx-screens" class="checklist"></div>

    <div class="heading">Settings</div>
    <div class="settings">
      <div class="srow">
        <label for="wx-location">Location</label>
        <input id="wx-location" type="text" autocomplete="off" placeholder="City or US ZIP" />
        <button id="wx-loc-set">Set</button>
      </div>
      <div class="srow">
        <label for="wx-units">Units</label>
        <select id="wx-units">
          <option value="imperial">US</option>
          <option value="metric">Metric</option>
        </select>
      </div>
      <div class="srow">
        <label for="wx-speed">Speed</label>
        <select id="wx-speed">
          <option value="slow">Slow</option>
          <option value="normal">Normal</option>
          <option value="fast">Fast</option>
        </select>
      </div>
      <div class="srow">
        <label class="chk"><input type="checkbox" id="wx-music" /> Music</label>
        <input type="range" id="wx-vol" min="0" max="100" step="5" />
      </div>
      <p class="wx-status" id="wx-status"></p>
    </div>

    <div class="heading">Video library</div>
    <label id="drop" class="drop" for="file-input">
      <input id="file-input" type="file" accept="video/*,.mkv,.webm,.mov,.m4v,.avi,.ogv" multiple hidden />
      <span class="drop-main">Drop video files here or <u>browse</u></span>
      <span class="drop-sub">mp4 · mkv · webm · mov · m4v · avi · ogv</span>
    </label>
    <ul id="uploads" class="uploads"></ul>
    <ul id="playlist" class="playlist"></ul>

    <div class="heading">Headend Information</div>
    <div id="headend" class="headend"></div>
  </main>

  <script type="module" src="control.js"></script>
</body>
</html>

# crt-tv: a null sink that feeds the OwnTone AirPlay bridge. When it is the
# default sink, bridge-feed.sh captures its monitor and pipes raw PCM into
# OwnTone, which casts to the receiver WITH track metadata. Installed to
# /etc/pipewire/pipewire.conf.d/ by setup/install.sh.
context.objects = [
  {
    factory = adapter
    args = {
      factory.name = support.null-audio-sink
      node.name = "crt-bridge"
      node.description = "AirPlay bridge (titles)"
      media.class = Audio/Sink
      audio.position = [ FL FR ]
      audio.rate = 44100
    }
  }
]

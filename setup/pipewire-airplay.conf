# crt-tv: discover AirPlay receivers (e.g. an EverSolo DMP-A8) on the LAN
# and expose them as PipeWire sinks. Installed to
# /etc/pipewire/pipewire.conf.d/ by setup/install.sh. Needs avahi-daemon.
#
# raop.latency.ms is pinned so the player can compensate lip-sync exactly —
# keep it in step with AIRPLAY_LATENCY_MS in /etc/crt-tv/crt-tv.env.
# Suspend is disabled for RAOP streams: resuming a suspended AirPlay
# session silently fails on many receivers ("selected it, no sound").
context.modules = [
  {
    name = libpipewire-module-raop-discover
    args = {
      stream.rules = [
        {
          matches = [ { raop.ip = "~.*" } ]
          actions = {
            create-stream = {
              raop.latency.ms = 2000
              stream.props = {
                session.suspend-timeout-seconds = 0
              }
            }
          }
        }
      ]
    }
    flags = [ ifexists nofail ]
  }
]

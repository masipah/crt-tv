# crt-tv web remote over HTTPS — rendered by setup/install.sh (which
# replaces __DOMAIN__) into /etc/nginx/sites-available/crt-tv when
# HTTPS_DOMAIN is set in /etc/crt-tv/crt-tv.env. TLS terminates here;
# the Node server keeps speaking plain HTTP on 127.0.0.1:8090.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    # Multi-GB video uploads stream straight through to the Node server —
    # no size cap, no buffering to disk, no proxy timeout mid-transfer
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
}

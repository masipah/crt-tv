# crt-tv: don't restore remembered per-device volume/mute at boot — the
# appliance sets its own deterministic state (muted, jack default, outputs
# normalized) via tv autostart, and wireplumber's async restore was racing
# it and un-muting the TV after power-on. Installed to
# /etc/wireplumber/wireplumber.conf.d/ by setup/install.sh.
wireplumber.settings = {
  device.restore-props = false
}

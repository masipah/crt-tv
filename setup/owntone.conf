# crt-tv OwnTone config — the AirPlay-with-metadata bridge.
# Library is a single named pipe fed by bridge-feed.sh; pipe_autostart makes
# OwnTone play it whenever audio flows. Local sound output is disabled so
# OwnTone never fights PipeWire for the jack.
general {
	uid = "owntone"
	db_path = "/var/cache/owntone/songs3.db"
	logfile = "/var/log/owntone.log"
	loglevel = log
	admin_password = ""
	ipv6 = no
}

library {
	name = "CRT-TV"
	port = 3689
	directories = { "/srv/owntone-pipe" }
	pipe_autostart = true
	follow_symlinks = false
}

audio {
	type = "disabled"
}

# crt-tv configuration.
# Copy to config.toml and edit. config.toml is gitignored.

default_mode = "weather"    # mode shown on boot: weather | teletext | video

[server]
host = "0.0.0.0"            # 0.0.0.0 = reachable from other devices on your LAN
port = 8000

[weather]
# Just set a city name or a US ZIP code — it's geocoded automatically.
location = "London"         # e.g. "Austin", "Paris", "Tokyo", or "78701"
# country = "US"            # optional ISO code to disambiguate same-named cities
units = "metric"            # metric (°C, km/h) | imperial (°F, mph)

# Optional: cities for the WeatherStar "Latest Observations" and "Travel
# Forecast" screens (city names or US ZIPs). Leave empty to hide those screens.
# regional_cities = ["Dallas", "Houston", "San Antonio", "New Orleans"]

# Optional: pin an exact point and skip geocoding (overrides `location`):
# latitude = 51.5074
# longitude = -0.1278
# location_name = "London"  # display name (defaults to the geocoded name)
# timezone = "Europe/London"  # IANA tz, or "auto" to derive from coords

[video]
media_dir = "media"        # folder of video files, relative to repo root or absolute
shuffle = false            # play the playlist in random order
